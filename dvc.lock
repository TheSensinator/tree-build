      size: 417054016
    params:
      params.yaml:
        ot_version: v16.1
    outs:
    - path: data/filtered/OneZoom_provider_ids.csv
      hash: md5
      md5: f7c9bb8374957c07168bec36d6591347
      size: 221682224
  build_oz_tree:
    cmd:
    - cd data/OZTreeBuild/AllLife && build_oz_tree 
      BespokeTree/include_OT_v16.1/Base.PHY OpenTreeParts/OpenTree_all/ 
      AllLife_full_tree.phy
    deps:
    - path: data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1/
      hash: md5
      md5: cfe57e6fbd3572028ac2d83203a96fe4.dir
      size: 1534894
      nfiles: 55
    - path: data/OZTreeBuild/AllLife/OpenTreeParts/OpenTree_all/
      hash: md5
      md5: ed1333f8ed0fc9f2ca4315ce9cb3cc42.dir
      size: 81927748
      nfiles: 227
    params:
      params.yaml:
        ot_version: v16.1
        oz_tree: AllLife
    outs:
    - path: data/OZTreeBuild/AllLife/AllLife_full_tree.phy
      hash: md5
      md5: 0b17680b0a0a633f8ae50e4a8f68f17a
      size: 83061022
  CSV_base_table_creator:
    cmd:
    - mkdir -p data/output_files
    - CSV_base_table_creator data/OZTreeBuild/AllLife/AllLife_full_tree.phy 
      data/OpenTree/v16.1/taxonomy.tsv data/filtered/OneZoom_provider_ids.csv 
      data/filtered/OneZoom_latest-all.json 
      data/filtered/OneZoom_enwiki-latest-page.sql 
      data/filtered/pageviews/OneZoom_pageviews* -o data/output_files -v 
      --version 28017344 --exclude Archosauria_ott335588 Dinosauria_ott90215 
      --extra_source_file 
      data/OZTreeBuild/AllLife/BespokeTree/SupplementaryTaxonomy.tsv 2> 
      data/CSV_base_table_creator.log
    deps:
    - path: data/OZTreeBuild/AllLife/AllLife_full_tree.phy
      hash: md5
      md5: 0b17680b0a0a633f8ae50e4a8f68f17a
      size: 83061022
    - path: data/OZTreeBuild/AllLife/BespokeTree/SupplementaryTaxonomy.tsv
      hash: md5
      md5: 8e861649388bf88595b93c0199f2cc3a
      size: 312
      isexec: true
    - path: data/OpenTree/v16.1/taxonomy.tsv
      hash: md5
      md5: d7a58eaaf132522b89a506e96ca5098f
      size: 417054016
    - path: data/filtered/OneZoom_enwiki-latest-page.sql
      hash: md5
      md5: af577077774060f78a752f22e2f1c6d3
      size: 21445833
    - path: data/filtered/OneZoom_latest-all.json
      hash: md5
      md5: 65b22a5c761c78d79b30faf871d1e404
      size: 1542990225
    - path: data/filtered/OneZoom_provider_ids.csv
      hash: md5
