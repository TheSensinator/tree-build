      hash: md5
      md5: 81dfa9c3747bbe94c57161cc8e22d5c9.dir
      size: 1158499655
      nfiles: 7
  make_js_treefiles:
    cmd:
    - mkdir -p data/js_output
    - make_js_treefiles --outdir data/js_output
    deps:
    - path: data/output_files/
      hash: md5
