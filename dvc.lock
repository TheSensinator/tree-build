schema: '2.0'
stages:
  download_and_filter_wikidata:
    cmd: download_and_filter_wikidata --url "$(cat 
      data/Wiki/wd_JSON/latest-all-json-bz2-url.txt)" -o 
      data/filtered/OneZoom_latest-all.json
    deps:
    - path: data/Wiki/wd_JSON/latest-all-json-bz2-url.txt
      hash: md5
      md5: e094b0f57c0c14e1016842c2dac5482e
      size: 90
    outs:
    - path: data/filtered/OneZoom_latest-all.json
      hash: md5
      md5: 65b22a5c761c78d79b30faf871d1e404
      size: 1542990225
  extract_wikidata_titles:
    cmd: extract_wikidata_titles data/filtered/OneZoom_latest-all.json -o 
      data/filtered/wikidata_titles.txt
    deps:
    - path: data/filtered/OneZoom_latest-all.json
      hash: md5
      md5: 65b22a5c761c78d79b30faf871d1e404
      size: 1542990225
    outs:
    - path: data/filtered/wikidata_titles.txt
      hash: md5
      md5: e498b85311c8a84a0d5157a0bbbcb23f
      size: 9382189
  download_wikipedia_sql:
    cmd: wget --progress=bar:force -O data/Wiki/wp_SQL/enwiki-page.sql.gz "$(cat
      data/Wiki/wp_SQL/enwiki-page-sql-gz-url.txt)"
    deps:
    - path: data/Wiki/wp_SQL/enwiki-page-sql-gz-url.txt
      hash: md5
      md5: 1018a5c664d01747fdd7e218190cb4ac
      size: 72
    outs:
    - path: data/Wiki/wp_SQL/enwiki-page.sql.gz
      hash: md5
      md5: 541324eaa9f3f1a14bb6ddcf7ea95de6
      size: 2397370114
  download_and_filter_pageviews:
    cmd: download_and_filter_pageviews --titles-file 
      data/filtered/wikidata_titles.txt --months 12 -o data/filtered/pageviews
    deps:
    - path: data/filtered/wikidata_titles.txt
      hash: md5
      md5: e498b85311c8a84a0d5157a0bbbcb23f
      size: 9382189
    outs:
    - path: data/filtered/pageviews/
      hash: md5
      md5: f021afa12f9d7c893412a0b2980ab187.dir
      size: 104535557
      nfiles: 13
  filter_wikipedia_sql:
    cmd: filter_wikipedia_sql data/Wiki/wp_SQL/enwiki-page.sql.gz 
      data/filtered/wikidata_titles.txt -o 
      data/filtered/OneZoom_enwiki-latest-page.sql
    deps:
    - path: data/Wiki/wp_SQL/enwiki-page.sql.gz
      hash: md5
      md5: 541324eaa9f3f1a14bb6ddcf7ea95de6
      size: 2397370114
    - path: data/filtered/wikidata_titles.txt
      hash: md5
      md5: e498b85311c8a84a0d5157a0bbbcb23f
      size: 9382189
    outs:
    - path: data/filtered/OneZoom_enwiki-latest-page.sql
      hash: md5
      md5: af577077774060f78a752f22e2f1c6d3
      size: 21445833
  download_opentree:
    cmd: download_opentree --version v16.1 --output-dir data/OpenTree
    params:
      params.yaml:
        ot_version: v16.1
    outs:
    - path: data/OpenTree/v16.1/
      hash: md5
      md5: 87ff995e9d5028efc185857f34448746.dir
      size: 587064765
      nfiles: 3
  add_ott_numbers_to_trees:
    cmd:
    - rm -rf data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1
    - mkdir -p data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1
    - add_ott_numbers_to_trees --savein 
      data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1 --output_info 
      data/add_ott_numbers_to_trees.log 
      data/OZTreeBuild/AllLife/BespokeTree/include_noAutoOTT/*.[pP][hH][yY]
    deps:
    - path: data/OZTreeBuild/AllLife/BespokeTree/include_noAutoOTT/
      hash: md5
      md5: 8cb57266b725e9893505618bf366af54.dir
      size: 1231351
      nfiles: 56
    params:
      params.yaml:
        ot_version: v16.1
        oz_tree: AllLife
    outs:
    - path: data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1/
      hash: md5
      md5: cfe57e6fbd3572028ac2d83203a96fe4.dir
      size: 1534894
      nfiles: 55
  get_open_trees_from_one_zoom:
    cmd:
    - cd data/OZTreeBuild/AllLife && get_open_trees_from_one_zoom 
      ../../OpenTree/v16.1/draftversion.tre OpenTreeParts/OpenTree_all/ 
      BespokeTree/include_OT_v16.1/*.PHY
    deps:
    - path: data/OZTreeBuild/AllLife/BespokeTree/include_OT_v16.1/
      hash: md5
      md5: cfe57e6fbd3572028ac2d83203a96fe4.dir
      size: 1534894
      nfiles: 55
    - path: data/OZTreeBuild/AllLife/OpenTreeParts/OT_required/
      hash: md5
      md5: 81be05fde561126fb58b7bb7e8a0fbcd.dir
      size: 808
      nfiles: 3
    - path: data/OpenTree/v16.1/draftversion.tre
      hash: md5
      md5: f59f21497ceb1b33273a192a63308386
      size: 83619970
    params:
      params.yaml:
        ot_version: v16.1
        oz_tree: AllLife
    outs:
    - path: data/OZTreeBuild/AllLife/OpenTreeParts/OpenTree_all/
      hash: md5
      md5: ed1333f8ed0fc9f2ca4315ce9cb3cc42.dir
      size: 81927748
      nfiles: 227
  download_eol:
    cmd:
    - curl -L -D data/EOL/.headers -o data/EOL/provider_ids.csv.gz 
      https://eol.org/data/provider_ids.csv.gz
    - "grep -i last-modified data/EOL/.headers | tail -1 | sed 's/^[^:]*: //' > data/EOL/provider_ids_last_modified.txt"
    - rm -f data/EOL/.headers
    outs:
    - path: data/EOL/provider_ids.csv.gz
      hash: md5
      md5: 03c0e857a35695b6b6a5467014bd38d8
      size: 314398683
    - path: data/EOL/provider_ids_last_modified.txt
      hash: md5
      md5: cb59f793fb021063b7c35e821ee8086a
      size: 31
  filter_eol:
    cmd: filter_eol data/EOL/provider_ids.csv.gz 
      data/OpenTree/v16.1/taxonomy.tsv -o data/filtered/OneZoom_provider_ids.csv
    deps:
    - path: data/EOL/provider_ids.csv.gz
      hash: md5
      md5: 03c0e857a35695b6b6a5467014bd38d8
      size: 314398683
    - path: data/OpenTree/v16.1/taxonomy.tsv
      hash: md5
