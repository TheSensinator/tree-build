      size: 221682224
    - path: data/filtered/pageviews/
      hash: md5
      md5: f021afa12f9d7c893412a0b2980ab187.dir
      size: 104535557
      nfiles: 13
    params:
      params.yaml:
        build_version: 28017344
        exclude_from_popularity: Archosauria_ott335588 Dinosauria_ott90215
        ot_version: v16.1
        oz_tree: AllLife
    outs:
