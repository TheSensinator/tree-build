  discover_latest_wikidata_dump_url:
    cmd: discover_latest_wikidata_dump_url > 
      data/Wiki/wd_JSON/latest-all-json-bz2-url.txt
    outs:
    - path: data/Wiki/wd_JSON/latest-all-json-bz2-url.txt
